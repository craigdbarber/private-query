[project]
name = "private-query"
version = "0.1.0"
description = "A solution for embedding private datasets into vector stores and querying against local LLMs."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pytest",
    "maturin",
    "setuptools",
    "wheel",
    "hatchling",
    "pylint",
    "ruff",
    "bandit>=1.9.4",
    "flake8",
    "build",
    "cython>=3.2.4",
    "setuptools>=82.0.1",
    "wheel>=0.47.0",
    "chromadb==0.5.0",
    "pyyaml>=6.0.3",
    "more-itertools>=11.0.2",
    "torch==2.3.1",
    "polars>=1.40.1",
    "ollama>=0.6.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.bandit]
skips = ["B101"]
