[project]
name = "private-query"
version = "0.1.0"
description = "A solution for embedding private datasets into vector stores and querying against local LLMs."
readme = "README.md"
requires-python = ">=3.12,<3.13"

[dependency-groups]
main = [
    "chromadb",
    "pyyaml",
    "more-itertools",
    "torch",
    "polars",
    "ollama",
    "sentence-transformers"
]
dev = [
    { include-group = "main" },
    "pytest",
    "ruff",
    "bandit",
    "wheel",
    "maturin",
    "hatchling",
    "setuptools",
    "cython>=3.2.4",
    "puccinialin"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.bandit]
skips = ["B101"]

[tool.uv]
environments = [
    "sys_platform == 'darwin'",
    "sys_platform == 'linux'",
    "sys_platform == 'win32'"
]

[tool.ty.src]
include = ["src", "tests"]
exclude = [".venv", "bazel*"]

[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "S", "D"]
ignore = ["S101", "D203", "D213", "D205", "I001"]

[tool.pytest.ini_options]
# Add directories you want to completely skip during test discovery
norecursedirs = [
    ".venv",
    ".git",
    "bazel-*",
    "bazel-out"
]
