[project]
name = "private-query"
version = "0.1.0"
description = "A solution for embedding private datasets into vector stores and querying against local LLMs."
readme = "README.md"
requires-python = ">=3.11,<3.13"

[dependency-groups]
main = [
    "chromadb",
    "pyyaml",
    "more-itertools",
    "torch",
    "polars",
    "ollama",
    "sentence-transformers"
]
dev = [
    { include-group = "main" },
    "pytest",
    "ruff",
    "bandit",
    "wheel",
    "maturin",
    "hatchling",
    "setuptools"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.bandit]
skips = ["B101"]

[tool.uv]
environments = [
    "sys_platform == 'darwin'",
    "sys_platform == 'linux'",
    "sys_platform == 'win32'"
]